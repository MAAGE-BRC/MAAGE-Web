<div class="dashboard-layout-editor" style="min-width: 360px;">
	<p style="font-size: 0.8125rem; color: #6b7280; margin: 0 0 1rem 0;">
		Drag to reorder. Toggle visibility with checkboxes.
	</p>
	<div data-dojo-attach-point="chartListNode"></div>
	<div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #e5e7eb;">
		<button type="button" data-dojo-attach-point="resetBtn"
				style="padding: 0.375rem 0.75rem; font-size: 0.8125rem; color: #6b7280; background: none; border: 1px solid #d1d5db; border-radius: 6px; cursor: pointer;">
			Reset to Default
		</button>
		<div style="display: flex; gap: 0.5rem;">
			<button type="button" data-dojo-attach-point="cancelBtn"
					style="padding: 0.375rem 0.75rem; font-size: 0.8125rem; color: #374151; background: #ffffff; border: 1px solid #d1d5db; border-radius: 6px; cursor: pointer;">
				Cancel
			</button>
			<button type="button" data-dojo-attach-point="saveBtn"
					style="padding: 0.375rem 0.75rem; font-size: 0.8125rem; color: #ffffff; background: #2d6a4f; border: 1px solid #2d6a4f; border-radius: 6px; cursor: pointer;">
				Save Layout
			</button>
		</div>
	</div>
</div>
